services:
  - type: web
    name: cannon-cards-api
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    rootDir: backend
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_BASE_URL
        value: https://cannoncardsltd.onrender.com
      - key: CLIENT_ORIGIN
        value: https://soft-marzipan-926b7d.netlify.app
      - key: CLIENT_SUCCESS_URL
        value: https://soft-marzipan-926b7d.netlify.app/order-confirmation?session_id={CHECKOUT_SESSION_ID}
      - key: CLIENT_CANCEL_URL
        value: https://soft-marzipan-926b7d.netlify.app/checkout

      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_PORT
        sync: false
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_DATABASE
        sync: false
      - key: MYSQL_SSL
        value: "true"
      - key: MYSQL_SSL_CA_BASE64
        sync: false
      - key: MYSQL_SSL_REJECT_UNAUTHORIZED
        value: "true"

      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CODE_ENCRYPTION_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STORE_CURRENCY
        value: gbp

      - key: SHIPPO_API_TOKEN
        sync: false
      - key: SHIP_FROM_NAME
        sync: false
      - key: SHIP_FROM_COMPANY
        sync: false
      - key: SHIP_FROM_STREET1
        sync: false
      - key: SHIP_FROM_CITY
        sync: false
      - key: SHIP_FROM_STATE
        sync: false
      - key: SHIP_FROM_ZIP
        sync: false
      - key: SHIP_FROM_COUNTRY
        value: GB
      - key: SHIP_FROM_PHONE
        sync: false
      - key: SHIP_FROM_EMAIL
        sync: false

      - key: POKEWALLET_API_KEY
        sync: false
      - key: POKEWALLET_API_BASE_URL
        value: https://api.pokewallet.io

      - key: DEFAULT_SINGLE_WEIGHT_GRAMS
        value: "30"
      - key: DEFAULT_SINGLE_LENGTH_CM
        value: "20"
      - key: DEFAULT_SINGLE_WIDTH_CM
        value: "15"
      - key: DEFAULT_SINGLE_HEIGHT_CM
        value: "1"
      - key: DEFAULT_SEALED_WEIGHT_GRAMS
        value: "500"
      - key: DEFAULT_SEALED_LENGTH_CM
        value: "25"
      - key: DEFAULT_SEALED_WIDTH_CM
        value: "18"
      - key: DEFAULT_SEALED_HEIGHT_CM
        value: "8"
